<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #E5E7E0;
      --border: #D2D3CC;
      --text-primary: #4D4F46;
      --text-secondary: #656F5E;
      --text-muted: #9EA096;
      --tab-hover: rgba(0, 0, 0, 0.06);
      --tab-active-bg: rgba(0, 0, 0, 0.08);
      --tab-active-border: #4D4F46;
      --close-color: #9EA096;
      --close-hover-bg: rgba(0, 0, 0, 0.1);
      --close-hover-color: #4D4F46;
      --favicon-placeholder: rgba(0, 0, 0, 0.08);
      --scrollbar-thumb: rgba(0, 0, 0, 0.15);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #252628;
        --border: #3E4250;
        --text-primary: #EAECF6;
        --text-secondary: #AEB3C2;
        --text-muted: #626674;
        --tab-hover: rgba(255, 255, 255, 0.06);
        --tab-active-bg: rgba(255, 255, 255, 0.1);
        --tab-active-border: #EAECF6;
        --close-color: #626674;
        --close-hover-bg: rgba(255, 255, 255, 0.12);
        --close-hover-color: #EAECF6;
        --favicon-placeholder: rgba(255, 255, 255, 0.1);
        --scrollbar-thumb: rgba(255, 255, 255, 0.15);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      user-select: none;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      height: 100%;
      border-right: 1px solid var(--border);
    }

    .new-tab-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .new-tab-btn:hover {
      background: var(--tab-hover);
      color: var(--text-primary);
    }

    .new-tab-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .tab-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .tab-scroll::-webkit-scrollbar {
      width: 4px;
    }

    .tab-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .tab-scroll::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 2px;
    }

    .tab-list {
      list-style: none;
    }

    .tab {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s;
      position: relative;
    }

    .tab:hover {
      background: var(--tab-hover);
    }

    .tab.active {
      background: var(--tab-active-bg);
      border-left-color: var(--tab-active-border);
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .tab-favicon-placeholder {
      width: 16px;
      height: 16px;
      margin-right: 8px;
      flex-shrink: 0;
      background: var(--favicon-placeholder);
      border-radius: 2px;
    }

    .tab-title {
      flex: 1;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-close {
      opacity: 0;
      background: none;
      border: none;
      color: var(--close-color);
      cursor: pointer;
      padding: 2px;
      border-radius: 3px;
      flex-shrink: 0;
      line-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab-close svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .tab:hover .tab-close {
      opacity: 1;
    }

    .tab-close:hover {
      background: var(--close-hover-bg);
      color: var(--close-hover-color);
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <button class="new-tab-btn" id="newTabBtn">
      <svg viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 3a.75.75 0 0 1 .75.75v7.5h7.5a.75.75 0 0 1 0 1.5h-7.5v7.5a.75.75 0 0 1-1.5 0v-7.5h-7.5a.75.75 0 0 1 0-1.5h7.5v-7.5A.75.75 0 0 1 12 3Z"/></svg>
      <span>New Tab</span>
    </button>
    <div class="tab-scroll">
      <ul class="tab-list" id="tabList"></ul>
    </div>
  </div>

  <script>
    const tabList = document.getElementById('tabList');
    const newTabBtn = document.getElementById('newTabBtn');
    const CLOSE_SVG = '<svg viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="M4.75 3.69 12 10.94l7.25-7.25 1.06 1.06L13.06 12l7.25 7.25-1.06 1.06L12 13.06l-7.25 7.25-1.06-1.06L10.94 12 3.69 4.75l1.06-1.06Z"/></svg>';

    newTabBtn.addEventListener('click', () => {
      window.hogiumSidebar.newTab();
    });

    window.hogiumSidebar.onTabsUpdated((tabs) => {
      tabList.innerHTML = '';
      tabs.forEach((tab) => {
        const li = document.createElement('li');
        li.className = 'tab' + (tab.active ? ' active' : '');
        li.addEventListener('click', () => window.hogiumSidebar.switchTab(tab.id));

        let faviconHtml;
        if (tab.faviconUrl) {
          faviconHtml = `<img class="tab-favicon" src="${tab.faviconUrl}" onerror="this.style.display='none'">`;
        } else {
          faviconHtml = `<div class="tab-favicon-placeholder"></div>`;
        }

        li.innerHTML = `
          ${faviconHtml}
          <span class="tab-title">${escapeHtml(tab.title)}</span>
          <button class="tab-close" data-id="${tab.id}">${CLOSE_SVG}</button>
        `;

        const closeBtn = li.querySelector('.tab-close');
        closeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          window.hogiumSidebar.closeTab(tab.id);
        });

        tabList.appendChild(li);
      });
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Window drag — start immediately, but skip if maximized (main process handles that)
    let draggingWindow = false;
    document.addEventListener('mousedown', (e) => {
      if (e.target.closest('.tab, .new-tab-btn, .tab-close')) return;
      if (e.button !== 0) return;
      draggingWindow = true;
      window.hogiumSidebar.startWindowDrag();
    });
    document.addEventListener('mouseup', () => {
      if (draggingWindow) {
        draggingWindow = false;
        window.hogiumSidebar.stopWindowDrag();
      }
    });
    document.addEventListener('dblclick', (e) => {
      if (e.target.closest('.tab, .new-tab-btn, .tab-close')) return;
      // Stop any drag that mousedown started
      if (draggingWindow) {
        draggingWindow = false;
        window.hogiumSidebar.stopWindowDrag();
      }
      window.hogiumSidebar.toggleMaximize();
    });
  </script>
</body>
</html>
