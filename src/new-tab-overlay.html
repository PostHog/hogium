<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --backdrop: rgba(0, 0, 0, 0.3);
      --input-bg: #FDFDF8;
      --input-border: #D2D3CC;
      --input-shadow: rgba(0, 0, 0, 0.12);
      --text-primary: #4D4F46;
      --text-muted: #9EA096;
      --focus-color: #1D4AFF;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --backdrop: rgba(0, 0, 0, 0.5);
        --input-bg: #2D2E37;
        --input-border: #3E4250;
        --input-shadow: rgba(0, 0, 0, 0.3);
        --text-primary: #EAECF6;
        --text-muted: #626674;
        --focus-color: #2F80FA;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--backdrop);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      height: 100vh;
      padding-top: 20vh;
    }

    .search-container {
      width: 560px;
      max-width: 90vw;
    }

    .search-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 14px 20px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 16px;
      outline: none;
      box-shadow: 0 8px 32px var(--input-shadow), 0 2px 8px var(--input-shadow);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      border-color: var(--focus-color);
      box-shadow: 0 8px 32px var(--input-shadow), 0 0 0 2px var(--focus-color);
    }
  </style>
</head>
<body>
  <div class="search-container">
    <input
      type="text"
      class="search-input"
      placeholder="Search or enter URL..."
      id="searchInput"
      autofocus
    />
  </div>

  <script>
    const searchInput = document.getElementById('searchInput');

    function isUrl(input) {
      if (/^[^\s]+\.[^\s]+$/.test(input)) return true;
      if (/^https?:\/\//i.test(input)) return true;
      if (/^localhost(:\d+)?/i.test(input)) return true;
      return false;
    }

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        let input = searchInput.value.trim();
        if (!input) return;

        let url;
        if (isUrl(input)) {
          url = input.startsWith('http://') || input.startsWith('https://')
            ? input
            : 'https://' + input;
        } else {
          url = 'https://www.google.com/search?q=' + encodeURIComponent(input);
        }

        window.hogiumNewTab.submit(url);
        searchInput.value = '';
      }

      if (e.key === 'Escape') {
        window.hogiumNewTab.cancel();
        searchInput.value = '';
      }
    });

    // Click on backdrop dismisses
    document.body.addEventListener('click', (e) => {
      if (e.target === document.body) {
        window.hogiumNewTab.cancel();
        searchInput.value = '';
      }
    });

    window.hogiumNewTab.onShow(() => {
      searchInput.value = '';
      searchInput.focus();
    });
  </script>
</body>
</html>
