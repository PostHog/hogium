<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hogium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #EEEFE9;
      --border: #D2D3CC;
      --text-primary: #4D4F46;
      --text-secondary: #656F5E;
      --text-muted: #9EA096;
      --input-bg: #FDFDF8;
      --input-border: #D2D3CC;
      --btn-hover: rgba(0, 0, 0, 0.06);
      --btn-active: rgba(0, 0, 0, 0.1);
      --progress-color: #1D4AFF;
      --hedgehog-active-bg: rgba(29, 74, 255, 0.15);
      --hedgehog-active-shadow: rgba(29, 74, 255, 0.3);
      --logo-body: #000;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1E1F23;
        --border: #3E4250;
        --text-primary: #EAECF6;
        --text-secondary: #AEB3C2;
        --text-muted: #626674;
        --input-bg: #252628;
        --input-border: #3E4250;
        --btn-hover: rgba(255, 255, 255, 0.08);
        --btn-active: rgba(255, 255, 255, 0.12);
        --progress-color: #2F80FA;
        --hedgehog-active-bg: rgba(47, 128, 250, 0.2);
        --hedgehog-active-shadow: rgba(47, 128, 250, 0.4);
        --logo-body: #EAECF6;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      -webkit-app-region: drag;
      user-select: none;
    }

    .toolbar {
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    body.macos .toolbar {
      padding-left: 76px;
    }

    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: var(--progress-color);
      transition: width 0.3s ease;
      width: 0;
    }

    .progress-bar.loading {
      width: 70%;
      animation: progress-pulse 1.5s ease-in-out infinite;
    }

    .progress-bar.done {
      width: 100%;
      opacity: 0;
      transition: width 0.2s ease, opacity 0.3s ease 0.2s;
    }

    @keyframes progress-pulse {
      0% { width: 20%; }
      50% { width: 70%; }
      100% { width: 20%; }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-right: 2px;
      white-space: nowrap;
    }

    .logo svg {
      width: 26px;
      height: 16px;
    }

    .logo-body { fill: var(--logo-body); }

    .logo-text {
      font-size: 14px;
      font-weight: 700;
    }

    .nav-buttons {
      display: flex;
      gap: 4px;
      -webkit-app-region: no-drag;
    }

    button {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 4px 6px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover {
      background: var(--btn-hover);
      color: var(--text-primary);
    }

    button:active {
      background: var(--btn-active);
    }

    button svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .address-bar {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      padding: 5px 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      -webkit-app-region: no-drag;
    }

    .address-bar::placeholder {
      color: var(--text-muted);
    }

    .address-bar:focus {
      border-color: var(--progress-color);
      box-shadow: 0 0 0 1px var(--progress-color);
    }

    #hedgehogToggle {
      font-size: 15px;
      transition: background 0.2s, box-shadow 0.2s;
    }

    #hedgehogToggle.active {
      background: var(--hedgehog-active-bg);
      box-shadow: 0 0 12px var(--hedgehog-active-shadow);
    }
  </style>
</head>
<body>

7L1.70711 2.70711C1.07714 2.07714 0 2.52331 0 3.41421v5.16918c0 .26521.105357.51957.292893.7071L9.997 18.9946V10.997zM1.70711 12.7041C1.07714 12.0741 0 12.5203 0 13.4112v5.1692c0 .2652.105357.5196.292893.7071L9.997 28.9916V20.994l-8.28989-8.2899z" fill="#1D4AFF"/><path d="M19.994 11.4112c0-.2652-.1053-.5196-.2929-.7071l-7.997-7.99699c-.6299-.62997-1.70709-.1838-1.70709.7071v5.16918c0 .26521.10539.51957.29289.7071l9.7041 9.70411v-7.5834zM9.99701 28.9916h5.58339c.8909 0 1.3371-1.0771.7071-1.7071L9.99701 20.994v7.9976zM9.99701 10.997v7.5834c0 .2652.10539.5196.29289.7071l9.7041 9.7041v-7.5834c0-.2652-.1053-.5196-.2929-.7071L9.99701 10.997z" fill="#F54E00"/></svg>
      <span class="logo-text">hogium</span>
    </div>

      </button>
      <button onclick="window.hogium.forward()" title="Forward">
        <svg viewBox="0 0 24 24"><path fill-rule="evenodd" clip-rule="evenodd" d="m18.771 12.832-4.97 4.97a.75.75 0 1 0 1.062 1.06l5.542-5.542a1.75 1.75 0 0 0 0-2.475l-5.543-5.543a.75.75 0 0 0-1.06 1.06l4.97 4.97H3.832a.75.75 0 0 0 0 1.5h14.94Z"/></svg>

    </div>

    <input
      type="text"
      class="address-bar"
      placeholder="Search or enter URL..."
      id="addressBar"
    />

    <button id="hedgehogToggle" onclick="window.hogium.toggleHedgehog()" title="Toggle Hedgehog">🦔</button>

    <div class="progress-bar" id="progressBar"></div>
  </div>

  <script>
    const addressBar = document.getElementById('addressBar');
    const progressBar = document.getElementById('progressBar');
    const hedgehogToggle = document.getElementById('hedgehogToggle');

    function isUrl(input) {
      if (/^[^\s]+\.[^\s]+$/.test(input)) return true;
      if (/^https?:\/\//i.test(input)) return true;
      if (/^localhost(:\d+)?/i.test(input)) return true;
      return false;
    }

    addressBar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        let input = addressBar.value.trim();
        if (!input) return;

        let url;
        if (isUrl(input)) {
          url = input.startsWith('http://') || input.startsWith('https://')
            ? input
            : 'https://' + input;
        } else {
          url = 'https://www.google.com/search?q=' + encodeURIComponent(input);
        }

        window.hogium.navigate(url);
        addressBar.blur();
      }
    });

    window.hogium.onUrlChanged((url) => {
      addressBar.value = url;
    });

    window.hogium.onHedgehogState((enabled) => {
      hedgehogToggle.classList.toggle('active', enabled);
    });

    window.hogium.onLoading((loading) => {
      if (loading) {
        progressBar.className = 'progress-bar loading';
      } else {
        progressBar.className = 'progress-bar done';
        setTimeout(() => {
          if (progressBar.classList.contains('done')) {
            progressBar.className = 'progress-bar';
          }
        }, 500);
      }
    });

    window.hogium.onFocusUrlBar(() => {
      addressBar.focus();
      addressBar.select();
    });
  </script>
</body>
</html>
